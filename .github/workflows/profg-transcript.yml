name: Prof G Markets Transcript

on:
  workflow_dispatch:
  schedule:
    - cron: "30 12 * * *"
    - cron: "30 13 * * *"

permissions:
  contents: write

concurrency:
  group: profg-transcript
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Check 8:30 AM ET window
        id: et_guard
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          et_time="$(TZ=America/New_York date +%H:%M)"
          if [ "$et_time" = "08:30" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping because it is $et_time ET, not 08:30 ET."
          fi

      - name: Checkout
        if: steps.et_guard.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.et_guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        if: steps.et_guard.outputs.run == 'true'
        run: python -m pip install -e .

      - name: Run tests
        if: steps.et_guard.outputs.run == 'true'
        run: python -m unittest discover -s tests

      - name: Send latest transcript
        if: steps.et_guard.outputs.run == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
        run: python -m profg_transcript run

      - name: Commit state changes
        if: steps.et_guard.outputs.run == 'true'
        shell: bash
        run: |
          if git diff --quiet -- sent_episodes.json; then
            echo "No state changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sent_episodes.json
          git commit -m "Update sent Prof G Markets episodes"
          git push
